services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: wordleapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wordleapi"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=wordleapi;Username=postgres;Password=admin"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
