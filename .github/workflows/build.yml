name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Test (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: >-
          dotnet test WordleApi.Tests/WordleApi.Tests.csproj
          --no-build --configuration Release --verbosity normal
          --logger "trx;LogFileName=unit-results.trx"
          --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results
          retention-days: 7

      - name: Publish Host
        run: dotnet publish WordleApi.Host/WordleApi.Host.csproj --no-restore --configuration Release --output ./publish/host

      - name: Upload published host
        uses: actions/upload-artifact@v4
        with:
          name: wordle-api-host
          path: ./publish/host
          retention-days: 7
