name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test (.NET 10)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: wordleapi_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d wordleapi_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: >-
          dotnet test WordleApi.Tests/WordleApi.Tests.csproj
          --no-build --configuration Release --verbosity normal
          --logger "trx;LogFileName=unit-results.trx"
          --results-directory ./test-results

      - name: Run integration tests
        env:
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=wordleapi_test;Username=postgres;Password=test"
        run: >-
          dotnet test WordleApi.IntegrationTests/WordleApi.IntegrationTests.csproj
          --no-build --configuration Release --verbosity normal
          --logger "trx;LogFileName=integration-results.trx"
          --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: ./test-results
          retention-days: 7

      - name: Publish Host
        run: dotnet publish WordleApi.Host/WordleApi.Host.csproj --no-restore --configuration Release --output ./publish/host

      - name: Upload published host
        uses: actions/upload-artifact@v7
        with:
          name: wordle-api-host
          path: ./publish/host
          retention-days: 7
